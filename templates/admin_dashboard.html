<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">
        🏥 AI Community Health Monitoring System
    </h2>

    <h4 class="text-center text-primary mb-4">
        Admin Dashboard
    </h4>

    <div class="row">

        <div class="col-md-3">

            <div class="card text-white bg-primary shadow">

                <div class="card-body text-center">

                    <h5>Total Patients</h5>

                    <h1>{{ total }}</h1>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-white bg-success shadow">

                <div class="card-body text-center">

                    <h5>Low Risk</h5>

                    <h1>{{ low }}</h1>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-dark bg-warning shadow">

                <div class="card-body text-center">

                    <h5>Medium Risk</h5>

                    <h1>{{ medium }}</h1>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-white bg-danger shadow">

                <div class="card-body text-center">

                    <h5>High Risk</h5>

                    <h1>{{ high }}</h1>

                </div>

            </div>

        </div>

    </div>

    <hr class="my-5">

    <div class="text-center">

        <a href="/register_patient" class="btn btn-success btn-lg m-2">
            ➕ Register Patient
        </a>

        <a href="/patients" class="btn btn-primary btn-lg m-2">
            📋 View Patients
        </a>

        <a href="/" class="btn btn-secondary btn-lg m-2">
            🚪 Logout
        </a>

    </div>

</div>

</body>

</html>
