<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Patient</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5 mb-5">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">

            <h2 class="text-center">
                ✏️ Edit Patient
            </h2>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Name</label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            value="{{ patient.name }}"
                            required>

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">Age</label>

                        <input
                            type="number"
                            name="age"
                            class="form-control"
                            value="{{ patient.age }}"
                            required>

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">Gender</label>

                        <select
                            name="gender"
                            class="form-select"
                            required>

                            <option value="Male"
                            {% if patient.gender=="Male" %}selected{% endif %}>
                            Male
                            </option>

                            <option value="Female"
                            {% if patient.gender=="Female" %}selected{% endif %}>
                            Female
                            </option>

                            <option value="Other"
                            {% if patient.gender=="Other" %}selected{% endif %}>
                            Other
                            </option>

                        </select>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Mobile</label>

                        <input
                            type="text"
                            name="mobile"
                            class="form-control"
                            value="{{ patient.mobile }}"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Address</label>

                        <textarea
                            name="address"
                            class="form-control"
                            rows="2"
                            required>{{ patient.address }}</textarea>

                    </div>

                </div>

                <hr>

                <h4 class="text-primary">
                    Health Details
                </h4>

                <div class="row">

                    <div class="col-md-3 mb-3">

                        <label class="form-label">Temperature</label>

                        <input
                            type="number"
                            step="0.1"
                            name="temperature"
                            class="form-control"
                            value="{{ patient.temperature }}"
                            required>

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">Blood Pressure</label>

                        <input
                            type="text"
                            name="blood_pressure"
                            class="form-control"
                            value="{{ patient.blood_pressure }}"
                            required>

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">Heart Rate</label>

                        <input
                            type="number"
                            name="heart_rate"
                            class="form-control"
                            value="{{ patient.heart_rate }}"
                            required>

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label">Oxygen Level</label>

                        <input
                            type="number"
                            name="oxygen_level"
                            class="form-control"
                            value="{{ patient.oxygen_level }}"
                            required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Weight (kg)</label>

                        <input
                            type="number"
                            step="0.1"
                            name="weight"
                            class="form-control"
                            value="{{ patient.weight }}"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">Height (cm)</label>

                        <input
                            type="number"
                            step="0.1"
                            name="height"
                            class="form-control"
                            value="{{ patient.height }}"
                            required>

                    </div>

                </div>
                                <div class="row">

                    <!-- Symptoms -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Symptoms
                        </label>

                        <textarea
                            name="symptoms"
                            class="form-control"
                            rows="3"
                            required>{{ patient.symptoms }}</textarea>

                    </div>

                    <!-- Existing Disease -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Existing Disease
                        </label>

                        <textarea
                            name="existing_disease"
                            class="form-control"
                            rows="3">{{ patient.existing_disease }}</textarea>

                    </div>

                </div>

                <hr>

                <!-- AI Information -->

                <div class="row">

                    <div class="col-md-3 mb-3">

                        <label class="form-label fw-bold">
                            BMI
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            value="{{ patient.bmi }}"
                            readonly>

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label fw-bold">
                            Health Score
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            value="{{ patient.score }}"
                            readonly>

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label fw-bold">
                            Risk
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            value="{{ patient.risk }}"
                            readonly>

                    </div>

                    <div class="col-md-3 mb-3">

                        <label class="form-label fw-bold">
                            Recommendation
                        </label>

                        <textarea
                            class="form-control"
                            rows="2"
                            readonly>{{ patient.recommendation }}</textarea>

                    </div>

                </div>

                <hr>

                <div class="d-flex justify-content-between">

                    <a href="/patients"
                       class="btn btn-secondary">

                        ← Back

                    </a>

                    <button
                        type="submit"
                        class="btn btn-warning">

                        💾 Update Patient

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
