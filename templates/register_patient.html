<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register Patient</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5 mb-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h2 class="text-center">
                🏥 AI Health Monitoring System
            </h2>

            <h5 class="text-center">
                Register New Patient
            </h5>

        </div>

        <div class="card-body">

            {% with messages = get_flashed_messages() %}
                {% if messages %}

                    {% for message in messages %}

                        <div class="alert alert-success">

                            {{ message }}

                        </div>

                    {% endfor %}

                {% endif %}
            {% endwith %}

            <form method="POST" action="/register_patient">

                <div class="row">

                    <!-- Name -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Full Name
                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            required>

                    </div>

                    <!-- Age -->
                    <div class="col-md-3 mb-3">

                        <label class="form-label">
                            Age
                        </label>

                        <input
                            type="number"
                            name="age"
                            class="form-control"
                            min="1"
                            max="120"
                            required>

                    </div>

                    <!-- Gender -->
                    <div class="col-md-3 mb-3">

                        <label class="form-label">
                            Gender
                        </label>

                        <select
                            name="gender"
                            class="form-select"
                            required>

                            <option value="">Select</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>

                        </select>

                    </div>

                </div>

                <div class="row">

                    <!-- Mobile -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Mobile Number
                        </label>

                        <input
                            type="text"
                            name="mobile"
                            class="form-control"
                            maxlength="10"
                            required>

                    </div>

                    <!-- Address -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Address
                        </label>

                        <textarea
                            name="address"
                            class="form-control"
                            rows="2"
                            required></textarea>

                    </div>

                </div>

                <hr>

                <h4 class="text-primary">
                    Health Details
                </h4>

                <div class="row">

                    <!-- Temperature -->
                    <div class="col-md-3 mb-3">

                        <label class="form-label">
                            Temperature (°C)
                        </label>

                        <input
                            type="number"
                            step="0.1"
                            name="temperature"
                            class="form-control"
                            required>

                    </div>

                    <!-- Blood Pressure -->
                    <div class="col-md-3 mb-3">

                        <label class="form-label">
                            Blood Pressure
                        </label>

                        <input
                            type="text"
                            name="blood_pressure"
                            class="form-control"
                            placeholder="120/80"
                            required>

                    </div>

                    <!-- Heart Rate -->
                    <div class="col-md-3 mb-3">

                        <label class="form-label">
                            Heart Rate
                        </label>

                        <input
                            type="number"
                            name="heart_rate"
                            class="form-control"
                            required>

                    </div>

                    <!-- Oxygen -->
                    <div class="col-md-3 mb-3">

                        <label class="form-label">
                            Oxygen Level (%)
                        </label>

                        <input
                            type="number"
                            name="oxygen_level"
                            class="form-control"
                            min="50"
                            max="100"
                            required>

                    </div>

                </div>

                <div class="row">

                    <!-- Weight -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Weight (kg)
                        </label>

                        <input
                            type="number"
                            step="0.1"
                            name="weight"
                            class="form-control"
                            required>

                    </div>

                    <!-- Height -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Height (cm)
                        </label>

                        <input
                            type="number"
                            step="0.1"
                            name="height"
                            class="form-control"
                            required>

                    </div>

                </div>
                                <div class="row">

                    <!-- Symptoms -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Symptoms
                        </label>

                        <textarea
                            name="symptoms"
                            class="form-control"
                            rows="3"
                            placeholder="Enter patient symptoms..."
                            required></textarea>

                    </div>

                    <!-- Existing Disease -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Existing Disease
                        </label>

                        <textarea
                            name="existing_disease"
                            class="form-control"
                            rows="3"
                            placeholder="Diabetes, BP, Asthma... (If none, type 'None')"></textarea>

                    </div>

                </div>

                <hr>

                <div class="d-flex justify-content-between">

                    <a href="/patients" class="btn btn-secondary">
                        ← Back to Patient List
                    </a>

                    <button type="submit" class="btn btn-success">
                        💾 Register Patient
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
